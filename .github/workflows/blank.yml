name: CI

on: push

jobs:
  first:
    runs-on: ubuntu-latest
    steps:
      - name: create a file
        run: echo "This is my test report" > report.txt
        name: upload a file
        uses: actions/upload-artifact@v4
        with:
          name: report.txt
          path: ./report.txt

  second: 
    runs-on: ubuntu-latest
    needs: first
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: report.txt
          path: .
      - name: viewing reports from first job
        run: cat report.txt

